apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: postiz
  namespace: postiz
spec:
  chart:
    spec:
      chart: app-template
      version: 0.2.2
      sourceRef:
        kind: HelmRepository
        name: elfhosted
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: postiz
  values:
    global:
      nameOverride: postiz
    image:
      repository: ghcr.io/elfhosted/postiz
      tag: v1.57.0@sha256:2c4177d534553653d2745dd6e684ca7621f02cc195430a294add90c134e65166
    securityContext:
      seccompProfile:
        type: RuntimeDefault
      readOnlyRootFilesystem: true
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    automountServiceAccountToken: false
    persistence:
      tmp: 
        enabled: true
        type: emptyDir
        mountPath: /tmp    
    controller:
      replicas: 1
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
    ingress:
      main:
        enabled: false
    service:
      main:
        enabled: true # necessary for probes
        ports:
          http:
            port: 5000
