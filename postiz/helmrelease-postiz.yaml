apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: postiz
  namespace: postiz
spec:
  chart:
    spec:
      chart: app-template
      version: 0.2.1
      sourceRef:
        kind: HelmRepository
        name: elfhosted
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: postiz
  values:
    global:
      nameOverride: postiz
    image:
      repository: ghcr.io/elfhosted/postiz
      tag: v1.50.0@sha256:48e68b72211c9223b47b732c224721153a8f5da5b0db071822e0a0d1a4324375
    securityContext:
      seccompProfile:
        type: RuntimeDefault
      readOnlyRootFilesystem: true
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    automountServiceAccountToken: false
    persistence:
      tmp: 
        enabled: true
        type: emptyDir
        mountPath: /tmp    
    controller:
      replicas: 1
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
    ingress:
      main:
        enabled: false
    service:
      main:
        enabled: true # necessary for probes
        ports:
          http:
            port: 5000
